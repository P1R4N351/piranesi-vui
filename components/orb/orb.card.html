<!-- @dsCard group="Components" viewport="700x520" name="PiranesiOrb" subtitle="Six states × context modulations (bottom row on listening)" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--surface-deep); font-family: var(--font-ui); }
  a { color: var(--bronze-400); } a:hover { color: var(--bronze-300); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { PiranesiOrb } = window.PiranesiVUIDesignSystem_8af396;
const states = ["waiting", "listening", "thinking", "talking", "working", "error"];
const mods = ["dawn", "night", "rain", "storm", "degraded", "threat"];
function Card() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, padding: "12px 8px" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 4 }}>
        {states.map((s) => (
          <div key={s} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
            <div style={{ width: "100%", height: 190 }}><PiranesiOrb state={s} modulation="none" /></div>
            <span style={{ color: "var(--text-muted)", fontSize: "var(--text-xs)", letterSpacing: "var(--tracking-caps)", textTransform: "uppercase" }}>{s}</span>
          </div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 4 }}>
        {mods.map((m) => (
          <div key={m} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
            <div style={{ width: "100%", height: 190 }}><PiranesiOrb state="listening" modulation={m} /></div>
            <span style={{ color: "var(--text-muted)", fontSize: "var(--text-xs)", letterSpacing: "var(--tracking-caps)", textTransform: "uppercase" }}>{m}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
</script>
</body>
</html>
