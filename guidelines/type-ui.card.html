<!-- @dsCard group="Type" viewport="700x170" name="UI & Mono" subtitle="Interface text, captions, state labels" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-deep); padding: 18px 24px; display: flex; flex-direction: column; gap: 10px; }
  a { color: var(--bronze-400); } a:hover { color: var(--bronze-300); }
  .body { font-family: var(--font-ui); font-size: var(--text-md); line-height: var(--leading-normal); color: var(--text-body); margin: 0; }
  .label { font-family: var(--font-ui); font-size: var(--text-xs); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--bronze-500); margin: 0; }
  .mono { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--text-muted); margin: 0; }
</style>
</head>
<body>
  <p class="label">Listening</p>
  <p class="body">Setting the study lights to evening. Anything else?</p>
  <p class="mono">--font-ui · Verdana — transcripts, responses · --font-mono · IBM Plex Mono — captions, tokens</p>
</body>
</html>
