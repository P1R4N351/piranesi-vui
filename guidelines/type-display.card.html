<!-- @dsCard group="Type" viewport="700x150" name="Display — Cormorant Garamond" subtitle="Classical serif for names and headlines" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-deep); padding: 20px 24px; }
  a { color: var(--bronze-400); } a:hover { color: var(--bronze-300); }
  h1 { font-family: var(--font-display); font-weight: 500; font-size: var(--text-3xl); line-height: var(--leading-tight); color: var(--text-display); margin: 0; }
  p { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); margin: 10px 0 0; }
</style>
</head>
<body>
  <h1>House of Piranesi</h1>
  <p>--font-display · Cormorant Garamond 400/500/600 · headings, wake words, room names</p>
</body>
</html>
