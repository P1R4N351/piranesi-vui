<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-deep); font-family: var(--font-mono); padding: 16px 24px; display: flex; align-items: center; gap: 40px; }
  a { color: var(--bronze-400); } a:hover { color: var(--bronze-300); }
  .m { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .m img { height: 96px; }
  .m span { font-size: 10px; color: var(--text-muted); }
  .name { font-family: var(--font-display); font-size: var(--text-xl); color: var(--text-display); font-weight: 500; }
</style>
</head>
<body>
  <div class="m"><img src="../assets/glyph.svg" alt="Glyph"><span>assets/glyph.svg</span></div>
  <div class="m"><img src="../assets/mark-circle.svg" alt="Roundel"><span>assets/mark-circle.svg</span></div>
  <div class="m"><div class="name">House of Piranesi</div><span>wordmark is set in type — no drawn wordmark exists</span></div>
</body>
</html>
