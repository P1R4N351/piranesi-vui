    <sc-if value="{{ notModStorm }}" hint-placeholder-val="{{ true }}"><button onClick="{{ setModStorm }}" style="font-family: Verdana, system-ui, sans-serif; font-size: 10px; letter-spacing: 0.08em; padding: 5px 11px; border-radius: 999px; cursor: pointer; background: rgba(195,156,114,0.08); color: #D3B28D; border: 1px solid rgba(195,156,114,0.22); transition: all 180ms cubic-bezier(0.4, 0, 0.2, 1);" style-hover="background: rgba(195,156,114,0.16);">storm</button></sc-if>
    <sc-if value="{{ isModDegraded }}" hint-placeholder-val="{{ false }}"><button style="font-family: Verdana, system-ui, sans-serif; font-size: 10px; letter-spacing: 0.08em; padding: 5px 11px; border-radius: 999px; cursor: default; background: #C39C72; color: #0E1A38; border: 1px solid #C39C72;">degraded</button></sc-if>
    <sc-if value="{{ notModDegraded }}" hint-placeholder-val="{{ true }}"><button onClick="{{ setModDegraded }}" style="font-family: Verdana, system-ui, sans-serif; font-size: 10px; letter-spacing: 0.08em; padding: 5px 11px; border-radius: 999px; cursor: pointer; background: rgba(195,156,114,0.08); color: #D3B28D; border: 1px solid rgba(195,156,114,0.22); transition: all 180ms cubic-bezier(0.4, 0, 0.2, 1);" style-hover="background: rgba(195,156,114,0.16);">degraded</button></sc-if>
    <sc-if value="{{ isModThreat }}" hint-placeholder-val="{{ false }}"><button style="font-family: Verdana, system-ui, sans-serif; font-size: 10px; letter-spacing: 0.08em; padding: 5px 11px; border-radius: 999px; cursor: default; background: #8B1E2D; color: #FFD9D2; border: 1px solid #B3313F; text-transform: uppercase; font-weight: 700;">threat</button></sc-if>
    <sc-if value="{{ notModThreat }}" hint-placeholder-val="{{ true }}"><button onClick="{{ setModThreat }}" style="font-family: Verdana, system-ui, sans-serif; font-size: 10px; letter-spacing: 0.08em; padding: 5px 11px; border-radius: 999px; cursor: pointer; background: rgba(139,30,45,0.12); color: #C86B5C; border: 1px solid rgba(217,112,95,0.35); transition: all 180ms cubic-bezier(0.4, 0, 0.2, 1);" style-hover="background: rgba(139,30,45,0.25);">threat</button></sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 720}, &quot;initialState&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;waiting&quot;, &quot;listening&quot;, &quot;thinking&quot;, &quot;talking&quot;, &quot;working&quot;, &quot;error&quot;], &quot;default&quot;: &quot;listening&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Orb&quot;}, &quot;initialModulation&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;auto&quot;, &quot;dawn&quot;, &quot;day&quot;, &quot;dusk&quot;, &quot;night&quot;, &quot;rain&quot;, &quot;storm&quot;, &quot;degraded&quot;, &quot;threat&quot;], &quot;default&quot;: &quot;auto&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Orb&quot;}, &quot;showGlyph&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Orb&quot;}, &quot;intensity&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0, &quot;max&quot;: 1.5, &quot;step&quot;: 0.1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Orb&quot;}}">
class Component extends DCLogic {
  state = { mode: null, shape: "landscape", mod: null, mic: null };

  componentWillUnmount() {
    if (this.state.mic) this.state.mic.getTracks().forEach((t) => t.stop());
  }

  toggleMic = async () => {
    if (this.state.mic) {
      this.state.mic.getTracks().forEach((t) => t.stop());
      this.setState({ mic: null });
      return;
    }
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      this.setState({ mic: s });
    } catch (e) {
      console.warn("Microphone unavailable:", e);
    }
  };

  renderVals() {
    const mode = this.state.mode ?? (this.props.initialState ?? "listening");
    const mod = this.state.mod ?? (this.props.initialModulation ?? "auto");
    const shape = this.state.shape;
    const threat = mod === "threat";

    const CAPTIONS = {
      waiting: "",
      listening: "Listening…",
      thinking: "Considering…",
      talking: "The study lights are set to evening.",
      working: "Drawing the curtains in the gallery…",
      error: "I did not catch that.",
    };
    const THREAT_CAPTIONS = {
      waiting: "Perimeter armed.",
      listening: "Listening. Identify yourself.",
      thinking: "Assessing the intrusion…",
      talking: "You are not known to this house.",
      working: "Sealing the gallery.",
      error: "Signal lost.",
    };

    const caption = threat ? THREAT_CAPTIONS[mode] || "" : CAPTIONS[mode] || "";
    const hasCaption = !!caption;

    const vals = {
      mode,
      modName: mod,
      caption,
      hasCaption,
      capNormal: hasCaption && !threat,
      capThreat: hasCaption && threat,
      isThreatMode: threat,
      orbProps: {
        audio: this.state.mic,
        showGlyph: (this.props.showGlyph ?? true) && !(hasCaption && (shape === "square" || shape === "round")),
        intensity: this.props.intensity ?? 1,
        offsetX: shape === "landscape" && hasCaption ? -0.26 : 0,
      },
      micOn: !!this.state.mic,
      micOff: !this.state.mic,
      toggleMic: this.toggleMic,
    };

    const shapes = { L: "landscape", P: "portrait", S: "square", R: "round" };
    for (const key of Object.keys(shapes)) {
      const name = shapes[key];
      vals["is" + key] = shape === name;
      vals["not" + key] = shape !== name;
      vals["set" + key] = () => this.setState({ shape: name });
    }

    for (const m of ["waiting", "listening", "thinking", "talking", "working", "error"]) {
      const K = m.charAt(0).toUpperCase() + m.slice(1);
      vals["is" + K] = mode === m;
      vals["not" + K] = mode !== m;
      vals["set" + K] = () => this.setState({ mode: m });
    }

    for (const m of ["auto", "dawn", "day", "dusk", "night", "rain", "storm", "degraded", "threat"]) {
      const K = "Mod" + m.charAt(0).toUpperCase() + m.slice(1);
      vals["is" + K] = mod === m;
      vals["not" + K] = mod !== m;
      vals["set" + K] = () => this.setState({ mod: m });
    }

    return vals;
  }
}
</script>
</body>
